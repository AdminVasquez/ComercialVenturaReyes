<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — Comercial Ventura Reyes</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── VARIANTES ── */
    .variantes-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .variante-btn {
      padding: 4px 10px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms;
    }
    .variante-btn:hover { border-color: var(--accent); color: var(--accent); }
    .variante-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  </style>
</head>
<body>

<main>
  <div class="page-hero">
    <h1>Catálogo de <span style="color:var(--accent)">Productos</span></h1>
    <p>Encuentra el producto perfecto para tu hogar</p>
  </div>

  <div class="filters-bar">
    <input type="text" id="search-input" class="search-input" placeholder="🔍  Buscar productos..."/>
    <select id="cat-filter" class="filter-select">
      <option value="">Todas las categorías</option>
    </select>
    <select id="price-filter" class="filter-select">
      <option value="">Precio: Todos</option>
      <option value="0-100">$0 – $100</option>
      <option value="100-500">$100 – $500</option>
      <option value="500-1000">$500 – $1,000</option>
      <option value="1000-9999">$1,000+</option>
    </select>
    <select id="sort-filter" class="filter-select">
      <option value="">Ordenar por</option>
      <option value="price-asc">Precio: menor primero</option>
      <option value="price-desc">Precio: mayor primero</option>
      <option value="name-asc">Nombre A–Z</option>
    </select>
    <span class="results-count" id="results-count"></span>
  </div>

  <div class="section" style="padding-top:16px">
    <div class="product-grid" id="product-grid"></div>
    <div id="no-results" style="display:none;text-align:center;padding:60px 24px;color:var(--text2)">
      <p style="font-size:3rem;margin-bottom:12px">😕</p>
      <p style="font-size:1.1rem;font-weight:600">Sin resultados</p>
      <p style="margin-top:8px">Intenta con otros filtros o términos de búsqueda.</p>
    </div>
  </div>
</main>

<script src="script.js"></script>
<script src="layout.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const urlCat = params.get("cat") || "";

  const catSelect = document.getElementById("cat-filter");
  CATEGORIES.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.id; opt.textContent = `${c.icon}  ${c.name}`;
    if (c.id === urlCat) opt.selected = true;
    catSelect.appendChild(opt);
  });

  // Cambia la imagen cuando se selecciona una variante
  function seleccionarVariante(productId, img, btn) {
    // Cambiar imagen
    const imgEl = document.getElementById("img-" + productId);
    if (imgEl) imgEl.src = img;
    // Marcar botón activo
    const card = btn.closest(".product-card");
    card.querySelectorAll(".variante-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  function renderProducts() {
    const query = document.getElementById("search-input").value.toLowerCase();
    const cat   = document.getElementById("cat-filter").value;
    const price = document.getElementById("price-filter").value;
    const sort  = document.getElementById("sort-filter").value;

    let list = [...PRODUCTS];
    if (query) list = list.filter(p => p.name.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query));
    if (cat)   list = list.filter(p => p.category === cat);
    if (price) {
      const [min, max] = price.split("-").map(Number);
      list = list.filter(p => p.price >= min && p.price <= max);
    }
    if (sort === "price-asc")  list.sort((a,b) => a.price - b.price);
    if (sort === "price-desc") list.sort((a,b) => b.price - a.price);
    if (sort === "name-asc")   list.sort((a,b) => a.name.localeCompare(b.name));

    const grid  = document.getElementById("product-grid");
    const noRes = document.getElementById("no-results");
    document.getElementById("results-count").textContent = `${list.length} resultado${list.length !== 1 ? "s" : ""}`;

    if (list.length === 0) { grid.innerHTML = ""; noRes.style.display = "block"; return; }
    noRes.style.display = "none";

    grid.innerHTML = list.map((p, i) => {
      // Botones de variantes si el producto las tiene
      const variantesHTML = p.variantes && p.variantes.length > 0
        ? `<div class="variantes-wrap">
            ${p.variantes.map((v, vi) => `
              <button class="variante-btn ${vi === 0 ? 'active' : ''}"
                onclick="seleccionarVariante(${p.id}, '${v.img}', this)">
                ${v.color}
              </button>`).join("")}
           </div>`
        : "";

      return `
        <div class="product-card fade-up" style="animation-delay:${i * 0.04}s">
          <div class="product-img-wrap">
            <img id="img-${p.id}" src="${p.img}" alt="${p.name}" class="product-img" loading="lazy">
            <span class="product-cat-badge">${p.category}</span>
          </div>
          <div class="product-body">
            <h3 class="product-name">${p.name}</h3>
            <p class="product-desc">${p.desc}</p>
            ${variantesHTML}
            <div class="product-footer">
              <span class="product-price">$${p.price.toFixed(2)}</span>
              ${renderAddButton(p)}
            </div>
          </div>
        </div>`;
    }).join("");
  }

  ["search-input","cat-filter","price-filter","sort-filter"].forEach(id =>
    document.getElementById(id).addEventListener("input", renderProducts)
  );
  renderProducts();
</script>
</body>
</html>
